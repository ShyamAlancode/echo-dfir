name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pydantic orjson pyyaml pytest

      - name: Run unit tests
        run: |
          PYTHONPATH=. pytest tests/unit tests/spoliation tests/integration -v --import-mode=importlib

  spoliation-proof:
    name: Spoliation tests (architectural proof)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install pydantic orjson pyyaml pytest
      - name: Prove guardrails are architectural
        run: |
          PYTHONPATH=. pytest tests/spoliation -v --import-mode=importlib
          echo "All 12 spoliation tests passed — guardrails are architectural, not prompt-based"
