name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit + Spoliation tests
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install ECHO and deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (black)
        run: black --check .

      - name: Unit tests
        run: pytest tests/unit -v --tb=short

      - name: Spoliation tests (architectural guardrails)
        run: pytest tests/spoliation -v --tb=short

      - name: Schema-level coverage
        run: |
          pip install coverage
          coverage run -m pytest tests/unit tests/spoliation
          coverage report --fail-under=70

  spoliation-summary:
    name: Spoliation summary
    needs: test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: |
          pip install -e ".[dev]"
          pytest tests/spoliation --tb=no -q | tail -5
